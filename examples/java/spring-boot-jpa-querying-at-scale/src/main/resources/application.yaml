spring:
  application:
    name: spring-boot-jpa-querying-at-scale
  datasource:
    url: jdbc:h2:mem:jpa-query;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: ""
    hikari:
      maximum-pool-size: 5
      pool-name: jpa-query-pool
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
        generate_statistics: true
  sql:
    init:
      mode: never

server:
  port: 18086

logging:
  level:
    org.hibernate.SQL: DEBUG
