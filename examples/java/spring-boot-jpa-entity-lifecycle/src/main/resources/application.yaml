spring:
  application:
    name: spring-boot-jpa-entity-lifecycle
  datasource:
    url: jdbc:h2:mem:jpa-learning;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: ""
    hikari:
      maximum-pool-size: 5
      pool-name: jpa-learning-pool
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        generate_statistics: true
  sql:
    init:
      mode: never

server:
  port: 18085

logging:
  level:
    org.hibernate.SQL: DEBUG
