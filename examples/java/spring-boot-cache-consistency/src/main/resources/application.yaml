spring:
  application:
    name: spring-boot-cache-consistency
  datasource:
    url: jdbc:h2:mem:cache-consistency;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: ""
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  data:
    redis:
      host: localhost
      port: 6379
      connect-timeout: 1s
      timeout: 1s
      repositories:
        enabled: false

server:
  port: 18087

app:
  catalog:
    simulated-load-delay: 0ms
