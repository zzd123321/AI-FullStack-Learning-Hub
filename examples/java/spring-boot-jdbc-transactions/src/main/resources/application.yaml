spring:
  application:
    name: spring-boot-jdbc-transactions
  datasource:
    url: jdbc:h2:mem:learning;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: ""
    hikari:
      pool-name: learning-pool
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 1000
  flyway:
    validate-on-migrate: true
  sql:
    init:
      mode: never

server:
  port: 8080

logging:
  level:
    org.springframework.jdbc.core: INFO
