name: Frontend architecture

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  HUSKY: '0'

jobs:
  boundaries:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: npm
      - run: npm ci
      - run: npm run architecture:check
      - run: npm run typecheck:build
