name: Frontend performance

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  HUSKY: '0'

concurrency:
  group: frontend-performance-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  performance:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run performance:budget
      - run: npm run performance:lab
      - if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: .lighthouseci/
          retention-days: 7
