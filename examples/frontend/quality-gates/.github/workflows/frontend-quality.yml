name: Frontend quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  # 质量检查只需要读取仓库，不给默认 token 写权限。
  contents: read

concurrency:
  # 同一分支有新提交时，旧提交的结果已没有合并价值。
  group: frontend-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      HUSKY: '0'
    steps:
      # 真实仓库建议由依赖更新工具维护并固定到已验证的完整 commit SHA。
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'
          # 这里只缓存 npm 下载内容；node_modules 仍由 npm ci 按 lockfile 重建。
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:run
      - run: npm run build
